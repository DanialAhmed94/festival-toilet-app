# Run: dart run flutter_launcher_icons
# (Config in pubspec.yaml is used; this file kept for reference.)
flutter_launcher_icons:
  image_path: "assets/icons/toiletAppLogo.png"
  android: true
  min_sdk_android: 21
  adaptive_icon_background: "#0000FF"
  adaptive_icon_foreground: "assets/icons/toiletAppLogo.png"
  ios: true
  # image_path_ios: "assets/icon/icon.png"
  remove_alpha_channel_ios: true

  web:
    generate: true
    image_path: "path/to/image.png"
    background_color: "#hexcode"
    theme_color: "#hexcode"

  windows:
    generate: true
    image_path: "path/to/image.png"
    icon_size: 48 # min:48, max:256, default: 48

  macos:
    generate: true
    image_path: "path/to/image.png"
