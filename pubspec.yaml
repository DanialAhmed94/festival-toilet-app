name: crapadvisor
description: "A new Flutter project."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional bauild number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# In Windows, build-name is used as the major, minor, and patch parts
# of the product and file versions while build-number is used as the build suffix.
version: 1.0.4+1
dependency_overrides:
  win32: ^5.5.5

environment:
  sdk: '>=3.2.6 <4.0.0'

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.2
  lottie: ^3.0.0
  intl: ^0.19.0
  google_maps_flutter: ^2.5.3
  flutter_launcher_icons: ^0.13.1
  what3words: 3.2.0
  http: ^1.2.2
  connectivity_plus: ^4.0.1
  permission_handler: ^12.0.0+1
  location: ^8.0.0
  geocoding: ^2.2.0
  geolocator: ^11.0.0
  flutter_svg: ^2.0.5
  video_player: ^2.8.3
  image_picker: ^1.0.7
  syncfusion_flutter_sliders: ^25.1.37
  flutter_image_compress: ^2.2.0
  shared_preferences: ^2.3.2
  carousel_slider: ^5.0.0
  provider: ^6.1.2
  change_app_package_name: ^1.4.0
  cached_network_image: ^3.3.1
  url_launcher: ^6.2.6
  path_provider: ^2.1.4
  flutter_staggered_grid_view: ^0.7.0
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.3
  firebase_analytics: ^11.3.3
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^17.1.2
  cloud_firestore: ^5.6.8
  firebase_storage: ^12.3.7
  flutter_cache_manager: ^3.4.1
  file_picker: ^8.1.7
  pinput: ^3.0.1
  app_settings: ^6.1.1

  pool: ^1.5.1
  visibility_detector: ^0.4.0+2
  chewie: ^1.8.2
  video_compress: ^3.1.4
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.13.1
flutter_launcher_icons:
  android: true
  ios: true
  # Use a 512x512 PNG for best results (transparent background recommended)
  image_path: "assets/icons/toiletAppLog1.png"
  adaptive_icon_background: "#0000FF"
  # Inset (%) so the logo doesn't overflow the safe zone (default 16; higher = smaller logo)
 # adaptive_icon_foreground_inset: 28
  #min_sdk_android: 21
  # Make sure your image: Is square (e.g., 1024x1024) Has transparent background (very important for adaptive icons) Has no extra padding/white space

flutter:
  uses-material-design: true
  assets:
    - assets/annim/
    - assets/icons/
    - assets/svgs/
    - assets/svgs/feedback_form/
    - assets/images/
    - assets/images/waterportion/
    - assets/images/feedback_images/
    - assets/videos/
    - assets/fonts/
    - assets/resource_images/
    - assets/resource_svgs/
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-SemiBold.ttf
        - asset: assets/fonts/Poppins-Bold.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
    - family: Ubuntu
      fonts:
        - asset: assets/fonts/Ubuntu-Bold.ttf
        - asset: assets/fonts/Ubuntu-Regular.ttf
    - family: Quicksand
      fonts:
        - asset: assets/fonts/Quicksand-Bold.ttf
        - asset: assets/fonts/Quicksand-Medium.ttf